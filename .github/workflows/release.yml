# Generated by cargo-dist (https://opensource.axo.dev/cargo-dist/)
#
# Triggers on any git tag matching v* (e.g. v0.1.0)
# Builds binaries for all targets, creates a GitHub Release, and uploads:
#   - claude-arcade-{version}-{target}.tar.gz
#   - claude-arcade-installer.sh  (the curl | sh install script)
#   - dist-manifest.json

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  # Generate the release plan (what targets to build, what artifacts to produce)
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
            | sh
      - name: Plan release
        id: plan
        run: |
          cargo dist plan --tag=${{ github.ref_name }} --output-format=json \
            > dist-manifest.json
          echo "manifest=$(cat dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Upload dist-manifest.json
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json

  # Build binaries for each target platform
  build:
    needs: plan
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compile aarch64 Linux on x86_64 runner
      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
            | sh

      - name: Build binary
        run: cargo dist build --target=${{ matrix.target }} --output-format=json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distrib/

  # Publish the GitHub Release with all artifacts
  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
            | sh

      - name: Generate installer script and publish release
        run: |
          cargo dist publish \
            --tag=${{ github.ref_name }} \
            --from-artifacts=artifacts/dist-manifest.json
